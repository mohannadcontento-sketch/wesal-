<!DOCTYPE html>

<html dir="rtl" lang="ar"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Wesal - Login</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<style>
    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-surface text-on-surface min-h-screen flex flex-col items-center justify-center font-body-md p-lg">
<main class="w-full max-w-[400px] flex flex-col items-center justify-center space-y-xl">
<!-- Header/Logo Area -->
<div class="flex flex-col items-center space-y-sm">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center shadow-sm">
<span class="material-symbols-outlined text-on-primary text-display" style="font-variation-settings: 'FILL' 1;">favorite</span>
</div>
<h1 class="font-h1 text-h1 text-primary-container">Wesal</h1>
<p class="font-body-md text-body-md text-on-surface-variant text-center">مرحباً بك مجدداً. يرجى تسجيل الدخول للوصول إلى حسابك.</p>
</div>
<!-- Form Area -->
<div class="w-full bg-surface-container-lowest rounded-xl border border-outline-variant/30 p-lg shadow-[0_4px_20px_0_rgba(23,42,57,0.05)] space-y-md">
<h2 class="font-h2 text-h2 text-primary-container mb-md">تسجيل الدخول</h2>
<form class="space-y-md">
<!-- Email Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary-container block" for="email">البريد الإلكتروني</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/70">mail</span>
<input class="w-full bg-primary-fixed/20 border-transparent focus:border-primary-container focus:ring-0 rounded-lg py-3 pr-10 pl-3 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 transition-colors" dir="rtl" id="email" placeholder="أدخل بريدك الإلكتروني" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs">
<label class="font-label-md text-label-md text-primary-container block" for="password">كلمة المرور</label>
<div class="relative">
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant/70">lock</span>
<input class="w-full bg-primary-fixed/20 border-transparent focus:border-primary-container focus:ring-0 rounded-lg py-3 pr-10 pl-10 font-body-md text-body-md text-on-surface placeholder-on-surface-variant/50 transition-colors" dir="rtl" id="password" placeholder="أدخل كلمة المرور" type="password"/>
<button class="absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant/70 hover:text-primary-container transition-colors" type="button">
<span class="material-symbols-outlined">visibility_off</span>
</button>
</div>
<div class="flex justify-end pt-xs">
<a class="font-label-sm text-label-sm text-primary-container hover:opacity-80 transition-opacity" href="#">نسيت كلمة المرور؟</a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full bg-gradient-to-r from-primary-container to-tertiary-container text-on-primary font-label-md text-label-md py-4 rounded-full shadow-md hover:shadow-lg hover:opacity-90 transition-all duration-200 mt-md" type="submit">
                    دخول
                </button>
</form>
</div>
<!-- Links Area -->
<div class="flex flex-col items-center space-y-md w-full">
<p class="font-body-md text-body-md text-on-surface-variant">
                ليس لديك حساب؟ <a class="font-label-md text-label-md text-primary-container hover:underline decoration-2 underline-offset-4" href="#">إنشاء حساب</a>
</p>
<a class="flex items-center gap-xs font-label-sm text-label-sm text-on-surface-variant hover:text-primary-container transition-colors" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_forward</span>
                العودة للرئيسية
            </a>
</div>
</main>
</body></html>
