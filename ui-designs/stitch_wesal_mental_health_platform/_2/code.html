<body class="bg-surface relative min-h-screen flex items-center justify-center overflow-hidden font-body-md text-body-md text-on-surface">
<!-- Ambient Background Gradients for Energetic Depth -->
<div class="absolute inset-0 pointer-events-none overflow-hidden">
<div class="absolute top-[-10%] right-[-10%] w-[50vw] h-[50vw] rounded-full bg-primary-fixed/20 blur-[120px]"></div>
<div class="absolute bottom-[-20%] left-[-10%] w-[60vw] h-[60vw] rounded-full bg-tertiary-fixed/30 blur-[150px]"></div>
</div>
<!-- Centralized Verification Card (Glassmorphism Level 3) -->
<main class="relative z-10 w-full max-w-[480px] px-md">
<div class="bg-surface-container-lowest/60 backdrop-blur-[24px] border border-white/50 rounded-[24px] p-lg shadow-[0_16px_48px_-12px_rgba(0,43,45,0.08)] flex flex-col items-center text-center">
<!-- Key Icon Container -->
<div class="w-20 h-20 rounded-full bg-secondary-container/40 border border-secondary-fixed/50 flex items-center justify-center mb-md shadow-inner">
<span class="material-symbols-outlined text-[36px] text-primary" style="font-variation-settings: 'FILL' 0;">key</span>
</div>
<!-- Header -->
<h1 class="font-h2 text-h2 text-on-surface mb-sm">تأكيد البريد الإلكتروني</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-margin px-xs">
                لقد أرسلنا رمزاً مكوناً من 6 أرقام إلى بريدك الإلكتروني. يرجى إدخاله أدناه لتأكيد حسابك.
            </p>
<!-- OTP Input Form -->
<form class="w-full flex flex-col gap-md">
<!-- 6-Digit Inputs (forced LTR for numbers) -->
<div class="flex justify-between w-full dir-ltr gap-xs" dir="ltr">
<input class="w-12 h-14 bg-surface/50 border border-outline-variant rounded-xl text-center font-h3 text-h3 text-on-surface focus:border-tertiary-fixed focus:ring-2 focus:ring-tertiary-fixed outline-none transition-all shadow-sm" maxlength="1" type="text" value="4"/>
<input class="w-12 h-14 bg-surface/50 border border-outline-variant rounded-xl text-center font-h3 text-h3 text-on-surface focus:border-tertiary-fixed focus:ring-2 focus:ring-tertiary-fixed outline-none transition-all shadow-sm" maxlength="1" type="text" value="2"/>
<input class="w-12 h-14 bg-surface/50 border border-outline-variant rounded-xl text-center font-h3 text-h3 text-on-surface focus:border-tertiary-fixed focus:ring-2 focus:ring-tertiary-fixed outline-none transition-all shadow-sm" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 bg-surface/50 border border-outline-variant rounded-xl text-center font-h3 text-h3 text-on-surface focus:border-tertiary-fixed focus:ring-2 focus:ring-tertiary-fixed outline-none transition-all shadow-sm" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 bg-surface/50 border border-outline-variant rounded-xl text-center font-h3 text-h3 text-on-surface focus:border-tertiary-fixed focus:ring-2 focus:ring-tertiary-fixed outline-none transition-all shadow-sm" maxlength="1" type="text" value=""/>
<input class="w-12 h-14 bg-surface/50 border border-outline-variant rounded-xl text-center font-h3 text-h3 text-on-surface focus:border-tertiary-fixed focus:ring-2 focus:ring-tertiary-fixed outline-none transition-all shadow-sm" maxlength="1" type="text" value=""/>
</div>
<!-- Action Buttons -->
<div class="flex flex-col gap-sm w-full mt-xs">
<!-- Primary Button (Gradient) -->
<button class="bg-gradient-to-r from-primary to-primary-container text-on-primary rounded-xl font-label-bold text-label-bold py-[14px] px-6 w-full hover:opacity-90 transition-opacity shadow-[0_4px_12px_rgba(0,67,70,0.2)]" type="button">
                        تأكيد
                    </button>
<!-- Secondary Button (Ghost) -->
<button class="border border-tertiary-fixed/80 bg-surface-container-lowest/30 text-on-surface rounded-xl font-label-bold text-label-bold py-[14px] px-6 w-full flex items-center justify-center gap-xs hover:bg-tertiary-fixed/10 transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">refresh</span>
                        إعادة إرسال الرمز
                    </button>
</div>
</form>
<!-- Navigation Link -->
<a class="mt-margin font-label-sm text-label-sm text-primary-container hover:text-primary transition-colors flex items-center gap-base" href="#">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 0;">arrow_forward</span>
