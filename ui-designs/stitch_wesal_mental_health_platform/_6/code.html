<!DOCTYPE html>

<style>
        body { font-family: 'Manrope', sans-serif; }
        .glass-panel {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid rgba(255, 255, 255, 0.4);
        }
        .chat-bubble-sent {
            background: linear-gradient(135deg, #002b2d, #306669);
            color: white;
            border-bottom-left-radius: 4px;
        }
        .chat-bubble-received {
            background: #ffffff;
            border: 1px solid rgba(0, 43, 45, 0.1);
            color: #1c1c19;
            border-bottom-right-radius: 4px;
        }
        /* Custom scrollbar for chat area */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #dcdad5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #bfc8c8; }
    </style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col antialiased selection:bg-tertiary-fixed selection:text-on-tertiary-fixed">
<!-- Chat Header -->
<header class="glass-panel sticky top-0 z-50 flex items-center justify-between px-gutter py-sm border-b border-surface-dim shadow-[0_4px_24px_0_rgba(0,43,45,0.05)]">
<div class="flex items-center gap-sm">
<button aria-label="العودة" class="p-xs rounded-full hover:bg-surface-container transition-colors text-primary">
<span class="material-symbols-outlined text-[24px]">arrow_forward</span>
</button>
<div class="relative">
<img alt="صورة الطبيب" class="w-12 h-12 rounded-full object-cover border-2 border-surface" data-alt="A professional headshot of a female doctor with a warm, reassuring smile. The lighting is soft and bright, emphasizing a modern healthcare aesthetic. She wears a crisp white coat over a light teal shirt, aligning with the primary brand colors. The background is a gently blurred, bright clinical setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBoJIdRQgQBz0OSYxq9BvbwtfIW7XpE9vbSj1BdIPi3gPf9IYdFafeTEatE0D_DkjqTXIQTO9ktts-ujefRYDC3C06P84VOdCAFMb1WGCfHE92GfP1riUU4-xcgTtZVg8cJN27yXiwfez32iCb02TuDIbmX-7vhhsqeUJqGwrK5NBQf4_ROQfnWwfj7hYMyFU0Lc7QvQaCCLPI_vEUuOV_OcPgP-zLa5IsTiwbOmlOu930lNkRMxPfjZDmOPP1PzSyBwuVYZPtBJGo"/>
<div class="absolute bottom-0 right-0 w-3.5 h-3.5 bg-green-500 border-2 border-surface rounded-full"></div>
</div>
<div class="flex flex-col">
<h2 class="font-h3 text-h3 text-on-surface">د. سارة أحمد</h2>
<span class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1">
<span class="w-1.5 h-1.5 bg-green-500 rounded-full inline-block"></span> متصل الآن
                </span>
</div>
</div>
<div class="flex items-center gap-xs">
<button aria-label="مكالمة فيديو" class="p-xs rounded-full hover:bg-surface-container transition-colors text-primary">
<span class="material-symbols-outlined text-[24px]">videocam</span>
</button>
<button aria-label="مكالمة صوتية" class="p-xs rounded-full hover:bg-surface-container transition-colors text-primary">
<span class="material-symbols-outlined text-[24px]">call</span>
</button>
<button aria-label="خيارات إضافية" class="p-xs rounded-full hover:bg-surface-container transition-colors text-primary">
<span class="material-symbols-outlined text-[24px]">more_vert</span>
</button>
</div>
</header>
<!-- Main Chat Area -->
<main class="flex-1 overflow-y-auto p-gutter flex flex-col gap-md pb-32">
<!-- Date Divider -->
<div class="flex justify-center my-xs">
<span class="bg-surface-container-low font-label-sm text-label-sm text-on-surface-variant px-sm py-base rounded-full border border-surface-dim">اليوم</span>
</div>
<!-- Received Message -->
<div class="flex gap-sm max-w-[85%] self-start">
<img alt="صورة الطبيب" class="w-8 h-8 rounded-full object-cover hidden sm:block mt-auto" data-alt="A professional headshot of a female doctor with a warm, reassuring smile. The lighting is soft and bright, emphasizing a modern healthcare aesthetic. She wears a crisp white coat over a light teal shirt, aligning with the primary brand colors. The background is a gently blurred, bright clinical setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBGAvxyuuRcTVebwW1qdAfsfE2wlpQlts5yAYanu1wo4sXJVBxpTVGQJMEVal-5kap62NWy-Fa8kX4GjHdRtlBcFOAiiAvbLGbzainKMudml0985QaSHfvgFhTlI7FNIfs2MRLqQkA69fHG0GJR2xeIv1FbVRiYRaxcpZm3vbtjtY_LR-X3zvuPLGNd_q_SKJWJYhdRjRalVXEMA_GQP8vm9P45b1S_6opzayUySzx8Ne2wz3EB2GQZzAU_dnPGlcT7X6yZcFQyDHk"/>
<div class="flex flex-col gap-1">
<div class="chat-bubble-received p-sm rounded-2xl rounded-br-sm shadow-sm">
<p class="font-body-md text-body-md leading-relaxed">مرحباً! كيف حالك اليوم؟ هل لاحظت أي تحسن بعد الجلسة الأخيرة؟</p>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant mr-1">10:00 ص</span>
</div>
</div>
<!-- Sent Message -->
<div class="flex gap-sm max-w-[85%] self-end">
<div class="flex flex-col gap-1 items-end">
<div class="chat-bubble-sent p-sm rounded-2xl rounded-bl-sm shadow-md">
<p class="font-body-md text-body-md leading-relaxed text-on-primary">أهلاً دكتورة سارة. نعم، أشعر بتحسن طفيف. حاولت تطبيق التمارين التي تحدثنا عنها.</p>
</div>
<div class="flex items-center gap-1 ml-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">10:05 ص</span>
<span class="material-symbols-outlined text-[16px] text-primary" style="font-variation-settings: 'FILL' 1;">done_all</span>
</div>
</div>
</div>
<!-- Received Voice Message -->
<div class="flex gap-sm max-w-[85%] sm:max-w-[60%] self-start">
<img alt="صورة الطبيب" class="w-8 h-8 rounded-full object-cover hidden sm:block mt-auto" data-alt="A professional headshot of a female doctor with a warm, reassuring smile. The lighting is soft and bright, emphasizing a modern healthcare aesthetic. She wears a crisp white coat over a light teal shirt, aligning with the primary brand colors. The background is a gently blurred, bright clinical setting." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDWGgo7dtjfDQ8PXWWUARQtYsExuBFmipdO8P5snOR245PgJZo9hseuPrK6-Tv35VR2lfwB7JOKbK97glQXp4RCzTrGBejR5kfrFi8FjfBQ8lIDxud1H_7VykJLLyy0GuCDrvBUWVETykyFVa7G82Sn71MN4moyVDBbNvQpIuFGGWt7wuWZgF-P0xF8lQiZUn1szdpbrjMUYaHv0EF_nGDjPm-mQbpGaTTIh1qhhCsdTx3KiW1rr7AmpsDv7B_RprPyM3vdli4YPJI"/>
<div class="flex flex-col gap-1 w-full">
<div class="chat-bubble-received p-sm rounded-2xl rounded-br-sm shadow-sm flex items-center gap-sm">
<button class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center text-on-primary-fixed hover:bg-inverse-primary transition-colors flex-shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
</button>
<!-- Simulated Waveform -->
<div class="flex-1 flex items-center gap-[2px] h-8 px-2 overflow-hidden">
<div class="w-1 bg-primary/40 rounded-full h-[20%]"></div>
<div class="w-1 bg-primary/60 rounded-full h-[40%]"></div>
<div class="w-1 bg-primary rounded-full h-[80%]"></div>
<div class="w-1 bg-primary/80 rounded-full h-[60%]"></div>
<div class="w-1 bg-primary/40 rounded-full h-[30%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[20%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[50%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[30%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[70%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[40%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[20%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[50%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[30%]"></div>
<div class="w-1 bg-surface-dim rounded-full h-[60%]"></div>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant flex-shrink-0">0:45</span>
</div>
<span class="font-label-sm text-label-sm text-on-surface-variant mr-1">10:08 ص</span>
</div>
</div>
<!-- Sent Message -->
<div class="flex gap-sm max-w-[85%] self-end">
<div class="flex flex-col gap-1 items-end">
<div class="chat-bubble-sent p-sm rounded-2xl rounded-bl-sm shadow-md">
<p class="font-body-md text-body-md leading-relaxed text-on-primary">ممتاز، سأستمع إليها الآن. شكراً لك.</p>
</div>
<div class="flex items-center gap-1 ml-1">
<span class="font-label-sm text-label-sm text-on-surface-variant">10:10 ص</span>
<span class="material-symbols-outlined text-[16px] text-surface-dim">done</span>
</div>
</div>
</div>
</main>
<!-- Input Area -->
<div class="fixed bottom-0 w-full glass-panel p-sm border-t border-surface-dim shadow-[0_-4px_24px_0_rgba(0,43,45,0.05)]">
<div class="max-w-4xl mx-auto flex items-end gap-sm">
<button aria-label="إرفاق ملف" class="p-xs text-primary hover:bg-surface-container rounded-full transition-colors mb-1">
<span class="material-symbols-outlined text-[24px]">attach_file</span>
</button>
<div class="flex-1 bg-surface-container-low border border-surface-dim rounded-2xl flex items-end focus-within:border-primary-fixed focus-within:ring-1 focus-within:ring-primary-fixed transition-all shadow-inner overflow-hidden">
<textarea class="w-full bg-transparent border-none focus:ring-0 resize-none font-body-md text-body-md p-sm text-on-surface placeholder:text-on-surface-variant/50 max-h-32" placeholder="اكتب رسالة..." rows="1"></textarea>
<button aria-label="إضافة رموز تعبيرية" class="p-sm text-on-surface-variant hover:text-primary transition-colors">
<span class="material-symbols-outlined text-[24px]">mood</span>
</button>
</div>
<div class="flex gap-xs mb-1">
<button aria-label="تسجيل صوتي" class="p-sm rounded-full bg-surface-container-high text-primary hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined text-[24px]">mic</span>
</button>
<button aria-label="إرسال" class="p-sm rounded-full bg-primary text-on-primary hover:bg-surface-tint shadow-md transition-colors">
<span class="material-symbols-outlined text-[24px] rotate-180" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</div>
</body></html>
