<body class="bg-background text-on-background font-body-md font-body-md antialiased h-screen flex flex-col max-w-md mx-auto relative shadow-2xl">

<span class="material-symbols-outlined" data-icon="arrow_forward_ios">arrow_forward_ios</span>
</button>
<div class="relative">
<img alt="Doctor avatar" class="w-10 h-10 rounded-full object-cover border border-outline-variant" data-alt="A professional headshot of a friendly Middle Eastern female doctor wearing a white coat, looking directly at the camera with a warm, reassuring smile. The background is a soft, blurred clinical setting. The lighting is bright and even, evoking a modern, professional, and trustworthy medical environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuCCgoLVAltd97Lfg55OdNxqQ7Zu5OVTI64cz2iaucXDU0ROT67ibSg67N7fQjKwmhItDvJL3NVxXS-32QuFmvr15qpFSoUW4-BC-9PltWy1BH65Qt0x-73CGDIkeOClUFK3dJ70bhomFKMjuH-rDgjYR3rqN6Xtv-O1-T5LYW6p6ukKa10rWmTpJC1LPbMTOywSQdAb1QKF6lW4cK7glCj0eMYv1ifnO7VF-sCVWvZOc6L_iFsNuxwJuwK_Yy-gHS6OhtSfiltgPs4"/>

</div>
<div class="flex flex-col items-end text-right">
<span class="font-label-md font-label-md text-on-surface">د. فاطمة أحمد</span>
<span class="font-label-sm font-label-sm text-on-surface-variant">متصل الآن</span>
</div>
</div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="more_vert">more_vert</span>
</button>
</header>
<!-- Chat Canvas -->
<main class="flex-1 overflow-y-auto p-4 space-y-6 flex flex-col bg-surface pb-24">
<!-- Date Divider -->
<div class="flex justify-center">
<span class="font-label-sm font-label-sm text-on-surface-variant bg-surface-container-low px-3 py-1 rounded-full">اليوم</span>
</div>
<!-- Received Message -->
<div class="flex gap-3 max-w-[85%] self-end flex-row-reverse">
<img alt="Doctor avatar" class="w-8 h-8 rounded-full object-cover mt-auto" data-alt="A professional headshot of a friendly Middle Eastern female doctor wearing a white coat, looking directly at the camera with a warm, reassuring smile. The background is a soft, blurred clinical setting. The lighting is bright and even, evoking a modern, professional, and trustworthy medical environment." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDU1BFl9fNqxFbqEqduoMCGZfMx9XgJ3llGC4ZeXVy0hTfDIMDY5y6c22N1O1DpOSHkhn629ZSCZRG44A5NPzdwZXVHJsOyfxmtZ3hAV0D6Ywz3_mQnnMHYVj139sFMIq22xILV3U9MxGhw4Kro6bA5sXDLxv3AS_kfDIBA5H3l9JB5DZZULJy3GI0X1hOrktFTkrk85_VOJNVWx2rvo7bjF_MPT4ZY8oWFep6EvT9ScM3vCxmUQSRLKZAs6WHujQMVqLtVFSsw3IE"/>

</div>
<span class="font-label-sm font-label-sm text-on-surface-variant text-left mr-1">10:00 ص</span>
</div>
</div>
<!-- Sent Message -->
<div class="flex gap-3 max-w-[85%] self-start">
<div class="flex flex-col gap-1 w-full">
<div class="bg-gradient-to-r from-primary-container to-tertiary-container text-on-primary p-4 rounded-2xl rounded-br-sm shadow-[0_4px_12px_rgba(0,67,70,0.1)]">
<p class="font-body-md font-body-md text-right">أهلاً دكتورة. أشعر ببعض القلق مؤخراً وأجد صعوبة في النوم.</p>
</div>
<span class="font-label-sm font-label-sm text-on-surface-variant text-right ml-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-primary-container" data-icon="done_all">done_all</span>
                    10:05 ص
                </span>
</div>
</div>

<button class="w-10 h-10 rounded-full bg-surface-container-lowest/20 flex items-center justify-center shrink-0">
<span class="material-symbols-outlined text-on-primary" data-icon="play_arrow" data-weight="fill">play_arrow</span>
</button>
<div class="flex-1">
<div class="h-6 w-full flex items-center gap-0.5 opacity-80">

<div class="w-1 bg-on-primary rounded-full h-2"></div>
<div class="w-1 bg-on-primary rounded-full h-4"></div>
<div class="w-1 bg-on-primary rounded-full h-6"></div>

<div class="w-1 bg-on-primary rounded-full h-3"></div>
<div class="w-1 bg-on-primary rounded-full h-5"></div>
</div>
</div>
<span class="font-label-sm font-label-sm text-on-primary/80 shrink-0">0:15</span>
</div>
<span class="font-label-sm font-label-sm text-on-surface-variant text-right ml-1 flex items-center gap-1">
<span class="material-symbols-outlined text-[14px] text-primary-container" data-icon="done_all">done_all</span>
                    10:06 ص
                </span>

<div class="bg-surface-container-lowest p-4 rounded-2xl rounded-bl-sm border border-primary-fixed/20 flex items-center gap-1 h-12">
<div class="w-2 h-2 bg-on-surface-variant rounded-full opacity-40"></div>
<div class="w-2 h-2 bg-on-surface-variant rounded-full opacity-60"></div>
<div class="w-2 h-2 bg-on-surface-variant rounded-full opacity-80"></div>
</div>
</div>
</main>
<!-- Input Area -->
<div class="absolute bottom-0 w-full bg-surface/95 backdrop-blur-md border-t border-primary-fixed/20 p-4">
<div class="flex items-end gap-3 flex-row-reverse">
<button class="w-12 h-12 rounded-full bg-primary-container text-on-primary flex items-center justify-center shrink-0 shadow-[0_4px_12px_rgba(0,67,70,0.2)] hover:bg-tertiary-container transition-colors">
<span class="material-symbols-outlined" data-icon="mic" data-weight="fill">mic</span>
</button>
<div class="flex-1 relative">
<textarea class="w-full bg-surface-container-low border-none rounded-xl px-4 py-3 pr-12 font-body-md font-body-md text-on-surface placeholder:text-on-surface-variant/60 focus:ring-2 focus:ring-primary-container resize-none text-right" placeholder="اكتب رسالة..." rows="1"></textarea>
<button class="absolute right-3 top-3 text-on-surface-variant hover:text-primary-container transition-colors">
<span class="material-symbols-outlined" data-icon="attach_file">attach_file</span>
</button>
</div>
</div>
</div>
</body></html>
